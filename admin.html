<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther | Command Center (Root)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: radial-gradient(circle at top right, #0a0a0a 0%, #050505 100%); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden; 
        }

        .admin-glass {
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-red {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white; 
            font-weight: 900; 
            font-style: italic;
            text-transform: uppercase; 
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-red:hover { 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.4); 
            filter: brightness(1.2);
        }

        .status-dot { 
            width: 10px; height: 10px; border-radius: 50%; 
            background: #dc2626; 
            box-shadow: 0 0 15px #dc2626; 
            animation: pulse 2s infinite; 
        }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
        
        .log-entry { border-left: 2px solid #dc2626; padding-left: 8px; margin-bottom: 8px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        input, textarea {
            background: rgba(255, 255, 255, 0.02) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important; 
        }
    </style>
</head>
<body class="p-6 md:p-12">
    
    <div class="fixed bottom-6 left-6 w-80 z-50">
        <div class="admin-glass p-4 rounded-2xl bg-black/60">
            <div class="flex items-center justify-between mb-3 border-b border-white/5 pb-2">
                <span class="text-[9px] font-black uppercase tracking-[0.3em] text-red-600">System Logs</span>
                <div class="w-1.5 h-1.5 rounded-full bg-red-600 animate-pulse"></div>
            </div>
            <div id="terminal_logs" class="h-40 overflow-y-auto font-mono text-[10px] flex flex-col-reverse">
                <div class="text-gray-700 italic">>> SECURE LINE ESTABLISHED...</div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-16">
        <div>
            <h1 class="text-6xl font-black italic uppercase tracking-tighter leading-none">
                COMMAND <span class="text-red-600 text-shadow-lg">CENTER</span>
            </h1>
            <p class="text-[10px] text-gray-500 font-bold tracking-[0.5em] mt-4 uppercase">Root Authority // Panther Security</p>
        </div>
        <div class="flex items-center gap-8 mt-8 md:mt-0 bg-white/5 p-4 rounded-3xl border border-white/10">
            <div class="status-dot"></div>
            <p class="text-xs font-black text-red-600 uppercase italic">Active Connection</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
        <div class="admin-glass p-10 rounded-[2.5rem] flex flex-col">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-white/50 mb-8 border-b border-white/5 pb-4">Key Generator</h3>
            <div class="space-y-6 flex-grow">
                <div>
                    <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Days</label>
                    <input type="number" id="key_days" value="30" class="w-full p-5 rounded-2xl text-sm font-black outline-none focus:border-red-600 transition">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Output</label>
                    <input type="text" id="key_output" readonly placeholder="AWAITING..." class="w-full p-5 rounded-2xl text-xs font-mono tracking-widest bg-black/40 text-red-500 border-none">
                </div>
            </div>
            <button id="gen_btn" class="btn-red w-full py-6 mt-10 rounded-2xl tracking-widest text-xs">Generate Protocol</button>
        </div>

        <div class="admin-glass p-10 rounded-[2.5rem]">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-white/50 mb-8 border-b border-white/5 pb-4">Broadcast Alert</h3>
            <div class="space-y-5">
                <input type="text" id="ann_title" placeholder="Protocol Title" class="w-full p-5 rounded-2xl text-sm font-black outline-none">
                <textarea id="ann_body" placeholder="System alert message..." class="w-full p-5 rounded-2xl text-sm h-32 resize-none font-medium outline-none"></textarea>
            </div>
            <button id="broadcast_btn" class="w-full py-6 mt-8 bg-white text-black font-black italic rounded-2xl uppercase tracking-widest text-xs hover:bg-red-600 hover:text-white transition-all duration-500">Push Alert</button>
        </div>

        <div class="admin-glass p-10 rounded-[2.5rem] flex flex-col">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-white/50 mb-8 border-b border-white/5 pb-4">Telemetry</h3>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="p-6 rounded-3xl bg-white/5 border border-white/5 text-center">
                    <span id="total_licenses" class="text-3xl font-black italic text-white">0</span>
                    <span class="text-[9px] uppercase font-bold text-gray-500 block mt-2">Total Keys</span>
                </div>
                <div class="p-6 rounded-3xl bg-white/5 border border-white/5 text-center">
                    <span id="active_users_count" class="text-3xl font-black italic text-green-500">0</span>
                    <span class="text-[9px] uppercase font-bold text-gray-500 block mt-2">Active</span>
                </div>
            </div>
            <div class="flex-grow bg-black/40 rounded-3xl p-5 border border-white/5 overflow-y-auto max-h-[160px] font-mono text-[10px]" id="log_container"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <div class="admin-glass rounded-[3rem] overflow-hidden">
            <div class="p-10 border-b border-white/5 flex justify-between">
                <h3 class="text-sm font-black uppercase tracking-[0.3em] italic">Active Protocols</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase text-gray-400 tracking-widest">
                            <th class="p-8">Key</th>
                            <th class="p-8">Duration</th>
                            <th class="p-8">Status</th>
                            <th class="p-8">HWID</th>
                            <th class="p-8 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="key_table_body" class="font-mono text-xs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, set, get, child, remove, onValue, update } from "./firebase-config.js";

        const terminalLogs = document.getElementById('terminal_logs');
        
        // Loglama Sistemi
        window.addTerminalLog = (msg, isError = false) => {
            const div = document.createElement('div');
            div.className = "log-entry";
            const color = isError ? "text-red-500" : "text-gray-400";
            div.innerHTML = `<span class="${color}">>> ${msg}</span>`;
            terminalLogs.prepend(div);
        };

        // Key Oluşturma (Fixlendi)
        document.getElementById('gen_btn').onclick = async () => {
            try {
                const days = document.getElementById('key_days').value || 30;
                const rand = Math.random().toString(36).substr(2, 6).toUpperCase();
                const newKey = `PANTHER-${rand}-${days}D`;
                
                // Firebase'e yazıyoruz
                await set(ref(db, 'keys/' + newKey), {
                    days: parseInt(days),
                    status: 'UNUSED',
                    isOnline: false,
                    hwid: null,
                    createdAt: Date.now()
                });

                document.getElementById('key_output').value = newKey;
                window.addTerminalLog(`GENERATED: ${newKey}`);
            } catch (err) {
                console.error(err);
                window.addTerminalLog(`HATA: ${err.message}`, true);
            }
        };

        // HWID Reset (Kritik Fix)
        window.resetHWID = async (id) => {
            if(confirm(`${id} HWID Resetlensin mi?`)) {
                try {
                    await update(ref(db, `keys/${id}`), { hwid: null, status: 'UNUSED' });
                    window.addTerminalLog(`HWID RESET: ${id}`);
                } catch (err) {
                    window.addTerminalLog(`HATA: Resetlenemedi!`, true);
                }
            }
        };

        // Key Silme
        window.deleteKey = async (id) => {
            if(confirm(`${id} silinsin mi?`)) {
                try {
                    await remove(ref(db, 'keys/' + id));
                    window.addTerminalLog(`DELETED: ${id}`, true);
                } catch (err) {
                    window.addTerminalLog(`HATA: Silinemedi!`, true);
                }
            }
        };

        // Veri Dinleme ve Tablo Güncelleme
        onValue(ref(db, 'keys'), (snapshot) => {
            const tbody = document.getElementById('key_table_body');
            const totalDisplay = document.getElementById('total_licenses');
            const activeDisplay = document.getElementById('active_users_count');
            
            tbody.innerHTML = '';
            if (snapshot.exists()) {
                const data = snapshot.val();
                const keys = Object.keys(data);
                totalDisplay.innerText = keys.length;
                
                let activeCount = 0;
                keys.forEach(keyID => {
                    const k = data[keyID];
                    if(k.status === 'ACTIVE') activeCount++;

                    let statusStyle = k.status === 'ACTIVE' ? 'text-green-500 bg-green-500/5' : 
                                    (k.status === 'UNUSED' ? 'text-blue-500 bg-blue-500/5' : 'text-red-500 bg-red-500/5');

                    const tr = document.createElement('tr');
                    tr.className = "border-b border-white/[0.02] hover:bg-white/[0.01] transition";
                    tr.innerHTML = `
                        <td class="p-8 text-white font-black">${keyID}</td>
                        <td class="p-8 text-gray-500 italic">${k.days} Gün</td>
                        <td class="p-8"><span class="px-3 py-1 rounded-lg text-[9px] font-black ${statusStyle}">${k.status}</span></td>
                        <td class="p-8 text-gray-600 text-[10px]">${k.hwid ? k.hwid.substring(0, 15) + '...' : 'CLEAN'}</td>
                        <td class="p-8 text-right space-x-4">
                            <button onclick="resetHWID('${keyID}')" class="text-yellow-600 hover:text-yellow-400 text-[9px] font-black uppercase">HWID Reset</button>
                            <button onclick="deleteKey('${keyID}')" class="text-red-800 hover:text-red-500 text-[9px] font-black uppercase">Revoke</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                activeDisplay.innerText = activeCount;
            } else {
                totalDisplay.innerText = "0";
                activeDisplay.innerText = "0";
            }
        });

        // Global Alert
        document.getElementById('broadcast_btn').onclick = async () => {
            const t = document.getElementById('ann_title').value;
            const b = document.getElementById('ann_body').value;
            if(!t || !b) return;
            await set(ref(db, 'announcement'), { title: t, body: b, time: Date.now() });
            window.addTerminalLog(`GLOBAL BROADCAST SENT`);
        };

        window.addTerminalLog("PANTHER ROOT INITIALIZED.");
    </script>
</body>
</html>
