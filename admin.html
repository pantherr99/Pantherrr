<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther | Command Center (Root)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        .admin-glass {
            background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.03); transition: 0.3s;
        }
        .admin-glass:hover { border-color: rgba(220, 38, 38, 0.3); }

        .btn-red {
            background: #dc2626; color: white; font-weight: 900; font-style: italic;
            text-transform: uppercase; transition: all 0.3s;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.2);
            cursor: pointer;
        }
        .btn-red:hover { background: #ff0000; transform: translateY(-2px); box-shadow: 0 0 30px rgba(220, 38, 38, 0.4); }

        input, textarea {
            background: #0f0f0f !important; border: 1px solid #1f1f1f !important;
            color: #ef4444 !important; outline: none; transition: 0.2s;
        }
        input:focus { border-color: #dc2626 !important; box-shadow: 0 0 10px rgba(220, 38, 38, 0.1); }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #dc2626; box-shadow: 0 0 10px #dc2626; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12" id="main_body">
        <div class="text-center md:text-left">
            <h1 class="text-5xl font-black italic uppercase tracking-tighter leading-none">Command <span class="text-red-600">Center</span></h1>
            <p class="text-[10px] text-gray-600 font-bold tracking-[0.5em] mt-4 uppercase opacity-50">Panther Security Systems v4.0 // Root Access</p>
        </div>
        <div class="flex items-center gap-6 mt-8 md:mt-0">
            <div class="text-right">
                <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Network Status</p>
                <p class="text-xs font-black text-red-600 uppercase italic">Encrypted Connection</p>
            </div>
            <div class="status-dot"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
        
        <div class="admin-glass p-8 rounded-[2.5rem] flex flex-col shadow-2xl">
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-8 italic">Key Generator</h3>
            <div class="space-y-5 flex-grow">
                <div>
                    <label class="text-[8px] font-black text-gray-600 uppercase tracking-widest ml-2 mb-2 block">Validity Period (Days)</label>
                    <input type="number" id="key_days" value="30" class="w-full p-5 rounded-2xl text-sm font-bold">
                </div>
                <div>
                    <label class="text-[8px] font-black text-gray-600 uppercase tracking-widest ml-2 mb-2 block">Generated Result</label>
                    <input type="text" id="key_output" readonly placeholder="Ready to Generate" 
                           class="w-full p-5 rounded-2xl text-xs font-mono tracking-widest opacity-60 bg-black/40 cursor-pointer">
                </div>
            </div>
            <button id="gen_btn" class="btn-red w-full py-5 mt-8 rounded-2xl tracking-widest text-xs">Initialize New Key</button>
        </div>

        <div class="admin-glass p-8 rounded-[2.5rem] shadow-2xl">
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-8 italic">Global Broadcast</h3>
            <div class="space-y-5">
                <input type="text" id="ann_title" placeholder="Protocol Title" class="w-full p-5 rounded-2xl text-sm font-bold">
                <textarea id="ann_body" placeholder="System alert description..." class="w-full p-5 rounded-2xl text-sm h-32 resize-none font-bold"></textarea>
            </div>
            <button id="broadcast_btn" class="w-full py-5 mt-8 bg-white text-black font-black italic rounded-2xl uppercase tracking-widest text-xs hover:bg-red-600 hover:text-white transition-all">Push Global Alert</button>
        </div>

        <div class="admin-glass p-8 rounded-[2.5rem] flex flex-col shadow-2xl">
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-8 italic">System Telemetry</h3>
            <div class="space-y-6 mb-8">
                <div class="flex justify-between items-center p-4 rounded-2xl bg-white/[0.02] border border-white/5">
                    <span class="text-[10px] uppercase font-black text-gray-500 tracking-tighter">Total Licenses</span>
                    <span id="total_licenses" class="text-xl font-black italic text-red-600">0</span>
                </div>
                <div class="flex justify-between items-center p-4 rounded-2xl bg-white/[0.02] border border-white/5">
                    <span class="text-[10px] uppercase font-black text-gray-500 tracking-tighter">Active Nodes</span>
                    <span id="active_users_count" class="text-xl font-black italic text-green-500">0</span>
                </div>
            </div>
            <div class="flex-grow bg-black/40 rounded-2xl p-4 border border-white/5 overflow-y-auto max-h-[160px]" id="log_container">
                <p class="text-[9px] font-mono text-gray-600 uppercase mb-2">>> System Log Initialized...</p>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <div class="admin-glass p-10 rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-gray-500 italic">Database Management</h3>
                <button id="purge_btn" class="text-[9px] text-red-600/40 font-black uppercase tracking-[0.2em] hover:text-red-600 transition">Purge All Data</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="border-b border-white/5 text-[9px] uppercase text-gray-600 tracking-[0.2em]">
                            <th class="pb-6 font-black">License Key</th>
                            <th class="pb-6 font-black">Duration</th>
                            <th class="pb-6 font-black">Status</th>
                            <th class="pb-6 font-black text-right">Operations</th>
                        </tr>
                    </thead>
                    <tbody id="key_table_body" class="font-mono text-[11px]"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, set, get, child, remove, onValue } from "./firebase-config.js";

        // Global Fonksiyonlar (HTML onclick'ler için window'a bağladık)
        window.addLog = (msg) => {
            const container = document.getElementById('log_container');
            if(!container) return;
            const time = new Date().toLocaleTimeString();
            const p = document.createElement('p');
            p.className = "text-[9px] font-mono text-red-600/60 mb-1 uppercase";
            p.innerHTML = `<span class="text-gray-700">[${time}]</span> > ${msg}`;
            container.prepend(p);
        };

        // Otomatik Dinleme (Real-time Sync)
        onValue(ref(db, 'keys'), (snapshot) => {
            const tbody = document.getElementById('key_table_body');
            const totalDisplay = document.getElementById('total_licenses');
            const activeDisplay = document.getElementById('active_users_count');
            
            tbody.innerHTML = '';
            if (snapshot.exists()) {
                const data = snapshot.val();
                const keys = Object.keys(data);
                totalDisplay.innerText = keys.length;
                
                let active = 0;
                keys.forEach(keyID => {
                    const k = data[keyID];
                    if(k.status === 'ACTIVE') active++;

                    let statusColor = k.status === 'ACTIVE' ? 'text-green-500 bg-green-500/5' : 
                                     (k.status === 'UNUSED' ? 'text-blue-500 bg-blue-500/5' : 'text-red-500 bg-red-500/5');

                    const tr = document.createElement('tr');
                    tr.className = "border-b border-white/[0.02] hover:bg-white/[0.01] transition group";
                    tr.innerHTML = `
                        <td class="py-6 font-black text-white group-hover:text-red-600 transition">${keyID}</td>
                        <td class="py-6 text-gray-500 italic">${k.days}D</td>
                        <td class="py-6"><span class="px-3 py-1 rounded-lg font-black text-[9px] ${statusColor}">${k.status}</span></td>
                        <td class="py-6 text-right">
                            <button onclick="window.deleteKey('${keyID}')" class="text-gray-700 hover:text-red-600 font-black uppercase text-[9px] tracking-widest transition">Revoke Access</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                activeDisplay.innerText = active;
            } else {
                totalDisplay.innerText = "0";
                activeDisplay.innerText = "0";
            }
        });

        // Key Oluşturma
        document.getElementById('gen_btn').onclick = async () => {
            const daysInput = document.getElementById('key_days');
            const days = daysInput ? daysInput.value : 30;
            const rand = Math.random().toString(36).substr(2, 6).toUpperCase();
            const newKey = `PANTHER-${rand}-${days}D`;
            
            try {
                await set(ref(db, 'keys/' + newKey), {
                    days: parseInt(days),
                    status: 'UNUSED',
                    expireDate: 0
                });
                const output = document.getElementById('key_output');
                if(output) output.value = newKey;
                window.addLog(`KEY DEPLOYED: ${newKey}`);
            } catch (e) { console.error(e); alert("Firebase Write Error!"); }
        };

        // Key Kopyalama
        document.getElementById('key_output').onclick = function() {
            if(!this.value) return;
            navigator.clipboard.writeText(this.value);
            window.addLog("KEY COPIED TO CLIPBOARD");
        };

        // Duyuru Gönderme
        document.getElementById('broadcast_btn').onclick = async () => {
            const titleInput = document.getElementById('ann_title');
            const bodyInput = document.getElementById('ann_body');
            const t = titleInput ? titleInput.value : "";
            const b = bodyInput ? bodyInput.value : "";
            if(!t || !b) return;
            await set(ref(db, 'announcement'), { title: t, body: b, time: Date.now() });
            window.addLog(`BROADCAST PUSHED: ${t}`);
            if(titleInput) titleInput.value = "";
            if(bodyInput) bodyInput.value = "";
        };

        // Tekli Silme
        window.deleteKey = async (id) => {
            if(confirm(`REVOKE ACCESS FOR ${id}?`)) {
                await remove(ref(db, 'keys/' + id));
                window.addLog(`REVOKED: ${id}`);
            }
        };

        // Full WIPE
        document.getElementById('purge_btn').onclick = async () => {
            if(confirm("DANGER: WIPE ENTIRE DATABASE?")) {
                await remove(ref(db, 'keys'));
                window.addLog("DATABASE PURGED.");
            }
        };

        window.addLog("MASTER ROOT INITIALIZED.");
    </script>
</body>
</html>
