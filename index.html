<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Project | Advanced Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Oxanium', sans-serif; }
        
        body {
            background-color: #030303;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #150826 0%, #030303 100%);
        }

        .bg-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(138, 43, 226, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        /* --- 360 DERECE DÖNEN METALİK LOGO --- */
        .logo-wrapper {
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .logo-wrapper img {
            width: 320px; /* Metalik panter için ideal boyut */
            height: auto;
            
            /* BEYAZLIĞI SİLİP METALİK PARLAKLIĞI ÖNE ÇIKARAN AYAR */
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.6)) contrast(1.2);

            /* 360 DERECE DÖNME VE SÜZÜLME */
            animation: rotate360 12s linear infinite;
            transform-style: preserve-3d;
        }

        @keyframes rotate360 {
            0% { transform: rotateY(0deg) translateY(0); }
            50% { transform: rotateY(180deg) translateY(-25px); }
            100% { transform: rotateY(360deg) translateY(0); }
        }

        .logo-area h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 12px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 40%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(138, 43, 226, 0.3));
        }

        .sub-text {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 45px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 500px;
            margin: 0 auto;
        }

        .btn {
            padding: 18px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.5px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 8px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        .btn:hover {
            background: rgba(138, 43, 226, 0.2);
            border-color: #8a2be2;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.4);
        }

        .footer {
            position: fixed;
            bottom: 30px;
            font-size: 11px;
            color: #444;
            letter-spacing: 3px;
        }

        @media (max-width: 600px) {
            .links { width: 100%; grid-template-columns: 1fr; }
            .logo-area h1 { font-size: 2.8rem; }
            .logo-wrapper img { width: 220px; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="container">
        <div class="logo-wrapper">
            <img src="https://raw.githubusercontent.com/pantherr99/Pantherrr/main/image.png" alt="Panther Metalic Logo">
        </div>

        <div class="logo-area">
            <h1>PANTHER</h1>
            <p class="sub-text">Optimization & Performance Apex</p>
        </div>

        <div class="links">
            <a href="#" class="btn">Discord Server</a>
            <a href="#" class="btn">Panther Pack</a>
            <a href="#" class="btn">YouTube</a>
            <a href="#" class="btn">Showcase</a>
        </div>

        <div class="footer">
            © 2026 PANTHER PRIV. ALL RIGHTS RESERVED.
        </div>
    </div>
</body>
</html>
