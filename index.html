<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Project | Premium Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Oxanium', sans-serif; }
        
        body {
            background-color: #050505;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #120624 0%, #050505 100%);
        }

        .bg-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(138, 43, 226, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            animation: fadeIn 1.5s ease-out;
        }

        /* --- 360 DERECE DÖNEN LOGO ALANI --- */
        .logo-wrapper {
            perspective: 1200px;
            margin-bottom: 20px;
        }

        .logo-wrapper img {
            width: 240px;
            height: auto;
            filter: drop-shadow(0 0 25px rgba(138, 43, 226, 0.6));
            animation: rotate360 10s linear infinite;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: filter 0.3s ease;

            /* !!! BEYAZ ARKA PLANI CSS İLE SİLMEK İÇİN !!! */
            mix-blend-mode: screen; 
            /* Not: Eğer resmin içindeki beyazlıklar da silinirse,
               en temiz çözüm resmi remove.bg gibi bir siteden şeffaflaştırmaktır. */
        }

        .logo-wrapper img:hover {
            filter: drop-shadow(0 0 40px rgba(138, 43, 226, 0.9));
        }

        @keyframes rotate360 {
            from { transform: rotateY(0deg) translateY(0); }
            50% { transform: rotateY(180deg) translateY(-15px); }
            to { transform: rotateY(360deg) translateY(0); }
        }

        /* --- YAZI VE BUTON STİLLERİ (Değişmedi) --- */
        .logo-area h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 10px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 30%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.4));
            margin-bottom: 5px;
        }

        .sub-text {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 40px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 450px;
            margin: 0 auto;
        }

        .btn {
            position: relative;
            padding: 16px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .btn:hover {
            background: rgba(138, 43, 226, 0.1);
            border-color: #8a2be2;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.3);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .btn:hover::after { left: 100%; }

        .footer {
            position: fixed;
            bottom: 25px;
            font-size: 10px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            .links { width: 100%; grid-template-columns: 1fr; }
            .logo-area h1 { font-size: 2.5rem; }
            .logo-wrapper img { width: 180px; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="container">
        <div class="logo-wrapper">
            <img src="https://cdn.discordapp.com/attachments/1424736114098569296/1488882908398883077/95068122-4F16-428E-8C62-E1C302FCDF57.png?ex=69ce65c3&is=69cd1443&hm=d52c5344f24249404c2f44f9c4b5fbcd2ea3e9ba550c4ab46e7590b1cd582850&" alt="Panther Logo">
        </div>

        <div class="logo-area">
            <h1>PANTHER</h1>
            <p class="sub-text">Ultimate Optimization Suite</p>
        </div>

        <div class="links">
            <a href="https://discord.gg/SENIN_LINKIN" class="btn">DISCORD SERVER</a>
            <a href="#" class="btn">DOWNLOAD PACK</a>
            <a href="#" class="btn">YOUTUBE</a>
            <a href="#" class="btn">SHOWCASE</a>
        </div>

        <div class="footer">
            © 2026 PANTHER PRIV. DESIGNED FOR PERFORMANCE.
        </div>
    </div>
</body>
</html>
