<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Project</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #8a2be2;
            text-align: center;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            width: 280px;
        }
        h1 { color: #8a2be2; text-shadow: 0 0 10px #8a2be2; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        .btn {
            display: block;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            background: #8a2be2;
            transition: 0.3s;
        }
        .btn:hover { background: transparent; border: 1px solid #8a2be2; box-shadow: 0 0 15px #8a2be2; }
    </style>
</head>
<body>
    <div class="card">
        <h1>PANTHER</h1>
        <p>FPS & Performance Optimization</p>
        <a href="#" class="btn">Discord</a>
        <a href="#" class="btn">Download</a>
    </div>
</body>
</html>
