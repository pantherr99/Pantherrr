<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Project | Premium Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Oxanium', sans-serif; }
        
        body {
            background-color: #050505;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            /* Arka plana derinlik katan mor radial gradient */
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
        }

        /* Arka plan detay noktaları */
        .bg-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(138, 43, 226, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        /* --- 360 DERECE DÖNEN LOGO ALANI --- */
        .logo-wrapper {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .logo-wrapper img {
            width: 280px; /* Logonu biraz büyüttüm daha net görünsün diye */
            height: auto;
            /* Mor Parlama Efekti */
            filter: drop-shadow(0 0 30px rgba(138, 43, 226, 0.7));
            
            /* BEYAZ ARKA PLANI SİLEN SİHİRLİ KOMUT */
            mix-blend-mode: screen; 

            /* Sürekli 360 derece dönme animasyonu */
            animation: rotate360 12s linear infinite;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: filter 0.4s ease;
        }

        .logo-wrapper img:hover {
            filter: drop-shadow(0 0 50px rgba(138, 43, 226, 1));
        }

        @keyframes rotate360 {
            from { transform: rotateY(0deg) translateY(0); }
            50% { transform: rotateY(180deg) translateY(-20px); } /* Yavaşça süzülme */
            to { transform: rotateY(360deg) translateY(0); }
        }

        /* --- YAZI STİLLERİ --- */
        .logo-area h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 12px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 40%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.5));
            margin-bottom: 10px;
        }

        .sub-text {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 45px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- BUTONLAR (PREMIUM GRID) --- */
        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 500px;
            margin: 0 auto;
        }

        .btn {
            position: relative;
            padding: 18px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.5px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 8px;
            transition: all 0.4s ease;
            overflow: hidden;
            text-transform: uppercase;
        }

        .btn:hover {
            background: rgba(138, 43, 226, 0.2);
            border-color: #8a2be2;
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.4);
        }

        /* Butonun içindeki parlama geçişi */
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.6s;
        }

        .btn:hover::after {
            left: 100%;
        }

        /* --- FOOTER --- */
        .footer {
            position: fixed;
            bottom: 30px;
            font-size: 11px;
            color: #444;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobil Duyarlılık */
        @media (max-width: 600px) {
            .links { width: 100%; grid-template-columns: 1fr; }
            .logo-area h1 { font-size: 2.8rem; letter-spacing: 5px; }
            .logo-wrapper img { width: 200px; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="container">
        <div class="logo-wrapper">
            <img src="https://cdn.discordapp.com/attachments/1424736114098569296/1488882908398883077/95068122-4F16-428E-8C62-E1C302FCDF57.png?ex=69ce65c3&is=69cd1443&hm=d52c5344f24249404c2f44f9c4b5fbcd2ea3e9ba550c4ab46e7590b1cd582850&" alt="Panther Premium Logo">
        </div>

        <div class="logo-area">
            <h1>PANTHER</h1>
            <p class="sub-text">Optimization & Performance Apex</p>
        </div>

        <div class="links">
            <a href="#" class="btn">Discord Server</a>
            <a href="#" class="btn">Panther Pack</a>
            <a href="#" class="btn">YouTube</a>
            <a href="#" class="btn">Showcase</a>
        </div>

        <div class="footer">
            © 2026 PANTHER PRIV. ALL RIGHTS RESERVED.
        </div>
    </div>
</body>
</html>
