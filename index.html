<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Project | Optimization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #080808;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, #080808 100%);
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 20px;
        }

        /* 3D Görsel Konteyner */
        .logo-3d-container {
            perspective: 1000px;
            margin-bottom: -10px; /* Yazıyla mesafeyi ayarlar */
        }

        .logo-3d-container img {
            width: 220px; /* PNG boyutunu buradan değiştirebilirsin */
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(138, 43, 226, 0.4));
            animation: float 5s ease-in-out infinite;
            transition: transform 0.4s ease;
            cursor: pointer;
        }

        /* Hover'da 3D eğilme efekti */
        .logo-3d-container img:hover {
            transform: rotateX(15deg) rotateY(-15deg) scale(1.05);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            50% { transform: translateY(-20px) rotateY(5deg); }
        }

        .logo-area h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.5));
            margin-bottom: 10px;
        }

        .sub-text {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
            margin: 0 auto;
        }

        .btn {
            position: relative;
            padding: 15px;
            text-decoration: none;
            color: #ddd;
            font-weight: 600;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 12px;
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .btn:hover {
            color: #fff;
            background: rgba(138, 43, 226, 0.1);
            border-color: #8a2be2;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.2);
        }

        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }

        .bg-dots {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#8a2be2 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            opacity: 0.1;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>
    
    <div class="container">
        <div class="logo-3d-container">
            <img src="https://cdn.discordapp.com/attachments/1424736114098569296/1488829158241865799/IMG_3750.png?ex=69ce33b4&is=69cce234&hm=543916f5faecfb4722bb2c8680d69ee317c8437d5bf4e9c436b09af63f365c2f&" alt="Panther Logo">
        </div>

        <div class="logo-area">
            <h1>PANTHER</h1>
            <p class="sub-text">PREMIUM OPTIMIZATION & PERFORMANCE</p>
        </div>

        <div class="links">
            <a href="DISCORD_LINKIN" class="btn">DISCORD SERVER</a>
            <a href="INDIRME_LINKIN" class="btn">PANTHER PACK (v1.0)</a>
            <a href="#" class="btn">YOUTUBE CHANNEL</a>
            <a href="#" class="btn">REVIEWS</a>
        </div>

        <div class="footer">
            © 2026 PANTHER PRIV. ALL RIGHTS RESERVED.
        </div>
    </div>
</body>
</html>
