<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther | Stealth Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        * { scroll-behavior: smooth; }
        body { background-color: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* 3D PANTHER ENGINE */
        .viewport {
            width: 350px; height: 350px;
            margin: 0 auto;
            perspective: 1500px;
            display: flex; justify-content: center; align-items: center;
            mix-blend-mode: screen;
        }
        #panther-logo { width: 100%; animation: pantherRotate 18s infinite linear; transform-style: preserve-3d; }
        @keyframes pantherRotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }

        /* THE LASER EFFECT */
        .laser {
            position: absolute; top: 0; left: 0; width: 100%; height: 1px;
            background: #10b981; box-shadow: 0 0 15px #10b981;
            animation: laserScan 3s infinite linear; opacity: 0.3;
        }
        @keyframes laserScan { 0% { top: 0%; } 100% { top: 100%; } }

        /* --- HİLE MENÜSÜ OVERLAY & TASARIM --- */
        #cheat-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999;
            backdrop-filter: blur(15px); justify-content: center; align-items: center;
        }

        .imgui-window {
            width: 980px; height: 620px;
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid rgba(185, 147, 255, 0.12);
            border-radius: 20px; display: flex; position: relative;
            box-shadow: 0 0 50px rgba(185, 147, 255, 0.05);
            animation: menuZoom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes menuZoom { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* Sidebar & Items */
        .sidebar { width: 85px; background: rgba(8, 8, 8, 0.5); border-right: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; align-items: center; padding: 30px 0; border-radius: 20px 0 0 20px; }
        .nav-item { width: 48px; height: 48px; margin-bottom: 22px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; transition: 0.3s; color: #333; }
        .nav-item.active { color: #b993ff; background: rgba(185, 147, 255, 0.08); box-shadow: 0 0 15px rgba(185, 147, 255, 0.1); }

        /* Main Menu Grid */
        .menu-grid { flex: 1; display: grid; grid-template-columns: 270px 1fr 270px; padding: 30px; gap: 25px; }
        .settings-panel { background: rgba(15, 15, 15, 0.4); border: 1px solid rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* GUI Elements */
        .gui-switch { position: relative; width: 34px; height: 18px; }
        .gui-switch input { opacity: 0; width: 0; height: 0; }
        .slider-dot { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1a1a1a; transition: .3s; border-radius: 20px; }
        .slider-dot:before { position: absolute; content: ""; height: 10px; width: 10px; left: 3px; bottom: 3px; background-color: #444; transition: .3s; border-radius: 50%; }
        input:checked + .slider-dot { background-color: rgba(185, 147, 255, 0.15); }
        input:checked + .slider-dot:before { transform: translateX(16px); background-color: #b993ff; }

        .esp-corner { position: absolute; width: 40px; height: 40px; border: 2px solid #00bfff; transition: 0.3s; }
        .top-left { top: 15%; left: 20%; border-right: 0; border-bottom: 0; }
        .top-right { top: 15%; right: 20%; border-left: 0; border-bottom: 0; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] glass border-b border-white/5 h-20 flex items-center justify-between px-10">
        <div class="text-2xl font-black italic uppercase tracking-tighter">Panther</div>
        <div class="hidden md:flex space-x-12 text-[9px] font-bold uppercase tracking-[0.4em] text-gray-500">
            <a href="#home" class="hover:text-white translatable" data-en="Home" data-tr="Ana Sayfa">Home</a>
            <a href="#protocol" class="hover:text-white translatable" data-en="Protocol" data-tr="Protokol">Protocol</a>
            <a href="#store" class="hover:text-white translatable" data-en="Store" data-tr="Mağaza">Store</a>
        </div>
        <div class="flex space-x-4 items-center">
            <button onclick="toggleLang()" id="lang-btn" class="text-[9px] font-black text-gray-500 hover:text-white uppercase">EN / TR</button>
            <button onclick="openMenu()" class="bg-white text-black px-8 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:bg-gray-200 translatable" data-en="LOGIN" data-tr="GİRİŞ">LOGIN</button>
        </div>
    </nav>

    <section id="home" class="min-h-screen flex flex-col justify-center items-center pt-20">
        <div class="viewport"><img src="panther.png" id="panther-logo" alt="Panther Logo"></div>
        <h1 class="text-8xl font-black italic uppercase tracking-tighter">Panther</h1>
        <p class="text-gray-600 text-[10px] tracking-[0.8em] font-bold uppercase mb-10 translatable" data-en="Become a Ghost in the Machine" data-tr="Makinedeki Hayalete Dönüş">Become a Ghost in the Machine</p>
    </section>

    <div id="cheat-overlay" onclick="if(event.target == this) closeMenu()">
        <div class="imgui-window" onclick="event.stopPropagation()">
            <div class="sidebar">
                <div class="mb-12"><img src="https://api.dicebear.com/7.x/shapes/svg?seed=Panther" class="w-10 h-10 rounded-xl"></div>
                <div class="nav-item active"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M22 12h-4M6 12H2M12 6V2M12 22v-4"/></svg></div>
                <div class="nav-item"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
                <div class="mt-auto nav-item text-red-500" onclick="closeMenu()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></div>
            </div>

            <div class="menu-grid">
                <div class="settings-panel">
                    <div class="text-[10px] font-black text-[#b993ff] tracking-widest uppercase mb-2">Combat Settings</div>
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg">
                        <span class="text-[10px] font-bold">Master Aimbot</span>
                        <label class="gui-switch"><input type="checkbox" checked><span class="slider-dot"></span></label>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] text-gray-500 font-bold uppercase"><span>Smoothing</span><span>4.5</span></div>
                        <input type="range" class="w-full accent-[#b993ff]" min="0" max="20" value="4.5">
                    </div>
                </div>

                <div class="relative flex flex-col justify-center items-center">
                    <div class="esp-corner top-left"></div>
                    <div class="esp-corner top-right" style="right:20%; top:15%; border-left:0; border-bottom:0;"></div>
                    <img src="https://i.imgur.com/3Ym9FhM.png" class="h-[350px] opacity-80" alt="Preview">
                    <div class="absolute bottom-10 bg-[#b993ff]/10 text-[#b993ff] text-[9px] px-4 py-1 rounded font-black tracking-widest animate-pulse">PANTHER ACTIVE</div>
                </div>

                <div class="settings-panel">
                    <div class="text-[10px] font-black text-[#b993ff] tracking-widest uppercase mb-2">Intelligence</div>
                    <div class="flex justify-between items-center p-3 rounded-lg bg-white/5">
                        <span class="text-[10px] font-bold">Box ESP</span>
                        <label class="gui-switch"><input type="checkbox" checked><span class="slider-dot"></span></label>
                    </div>
                    <div class="flex justify-between items-center p-3 rounded-lg bg-white/5">
                        <span class="text-[10px] font-bold">Snaplines</span>
                        <label class="gui-switch"><input type="checkbox"><span class="slider-dot"></span></label>
                    </div>
                    <button onclick="closeMenu()" class="mt-auto w-full py-3 bg-white/5 hover:bg-[#b993ff] hover:text-black transition text-[9px] font-black uppercase rounded-xl">Close Menu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dil değiştirme
        let currentLang = 'en';
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            document.getElementById('lang-btn').innerText = currentLang === 'en' ? 'EN / TR' : 'TR / EN';
            document.querySelectorAll('.translatable').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });
        }

        // MENÜ KONTROL FONKSİYONLARI
        function openMenu() {
            document.getElementById('cheat-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Sayfanın kaymasını engelle
        }

        function closeMenu() {
            document.getElementById('cheat-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
