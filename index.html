<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Project | Advanced Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Oxanium:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8a2be2; --bg: #020202; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Oxanium', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a0b35 0%, #020202 100%);
        }
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 1;
            pointer-events: none;
        }
        .main-wrapper { position: relative; z-index: 10; text-align: center; animation: fadeIn 1.5s ease-in; }
        .panther-stage { perspective: 1200px; margin-bottom: 25px; }
        .panther-stage img {
            width: 320px;
            /* Beyaz arka planı yok eden sihirli ayar */
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 35px rgba(138, 43, 226, 0.8));
            animation: rotateFull 12s linear infinite, float 4s ease-in-out infinite;
        }
        @keyframes rotateFull { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .content-box h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 4rem;
            letter-spacing: 12px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .tagline { font-size: 0.8rem; color: #666; letter-spacing: 5px; margin-bottom: 45px; text-transform: uppercase; }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 200px); gap: 15px; justify-content: center; }
        .btn-apex {
            padding: 16px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(138, 43, 226, 0.3);
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
            border-radius: 4px;
        }
        .btn-apex:hover { background: rgba(138, 43, 226, 0.2); border-color: var(--primary); transform: scale(1.05); box-shadow: 0 0 20px rgba(138, 43, 226, 0.4); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 600px) { .btn-grid { grid-template-columns: 1fr; width: 80%; } .content-box h1 { font-size: 2rem; } .panther-stage img { width: 220px; } }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="main-wrapper">
        <div class="panther-stage">
            <img src="https://cdn.discordapp.com/attachments/1424736114098569296/1488889768732262530/95068122-4F16-428E-8C62-E1C302FCDF57.png?ex=69ce6c27&is=69cd1aa7&hm=4c378d78c69308168fca0cf44f634612ce8f0f9dfc2a2c260f1abc29dc753121&" alt="Panther Premium">
        </div>
        <div class="content-box">
            <h1>PANTHER</h1>
            <p class="tagline">Apex Performance Suite</p>
        </div>
        <div class="btn-grid">
            <a href="https://discord.gg/SENIN_LINKIN" class="btn-apex">Discord</a>
            <a href="#" class="btn-apex">Download</a>
            <a href="#" class="btn-apex">YouTube</a>
            <a href="#" class="btn-apex">Reviews</a>
        </div>
    </div>
</body>
</html>
