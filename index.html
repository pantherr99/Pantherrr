<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Project | Advanced Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Oxanium:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #030303;
            color: #eee;
            font-family: 'Oxanium', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, #100520 0%, #030303 100%);
        }

        /* --- Arka Plan Partikül Efekti --- */
        .bg-lines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(138, 43, 226, 0.05) 40px, rgba(138, 43, 226, 0.05) 41px);
            z-index: 0;
            pointer-events: none;
        }

        .main-container {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Açılışta yumuşak kayma efekti */
            animation: containerReveal 1s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        /* --- 1. İSTEDİĞİN 360 DÖNME EFEKTİ --- */
        .logo-3d-scene {
            perspective: 1500px;
            margin-bottom: 30px;
            /* Hafif açılış efekti */
            animation: logoScaleIn 0.8s 0.2s ease-out both;
        }

        .logo-3d-scene img {
            width: 250px;
            height: auto;
            image-rendering: -webkit-optimize-contrast; /* PNG netliği */
            /* Mor Parlama ve Gölge */
            filter: drop-shadow(0 0 10px rgba(138, 43, 226, 0.3)) drop-shadow(0 0 40px rgba(138, 43, 226, 0.7));
            
            /* --- SÜREKLİ YAVAŞ 360 DERECE DÖNME VE SÜZÜLME --- */
            animation: pantherRotate360 8s linear infinite;
            transition: filter 0.3s ease;
        }

        .logo-3d-scene img:hover {
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4)) drop-shadow(0 0 60px rgba(138, 43, 226, 0.9));
        }

        /* --- LOGO YAZISI (Sert & Fütüristik) --- */
        .logo-area h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: 12px;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            margin-bottom: 10px;
            
            /* Yazı Parıltı Efekti */
            text-shadow: 0 0 15px rgba(138, 43, 226, 0.8);
            
            /* Glitch efekti ve açılış */
            animation: glitchEffect 3s infinite;
        }

        .sub-text {
            font-weight: 600;
            color: #888;
            font-size: 1rem;
            margin-bottom: 45px;
            letter-spacing: 3px;
            text-transform: uppercase;
            /* Shimmer (Parlama) Efekti */
            background: linear-gradient(90deg, #444, #fff, #444);
            background-size: 80% 100%;
            background-repeat: no-repeat;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerEffect 2.5s infinite;
        }

        /* --- LİNKLER (Sert ve Profesyonel) --- */
        .links-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 500px;
            margin-top: 20px;
            /* Açılış kayma */
            animation: linksSlideIn 0.8s 0.6s ease-out both;
        }

        .btn-premium {
            text-decoration: none;
            color: #ddd;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 18px 25px;
            position: relative;
            
            /* Temel Stil */
            background: rgba(13, 13, 13, 0.8);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 4px; /* Keskin köşeler */
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
            cursor: pointer;
        }

        /* Buton Arka Plan Parlaması (Shimmer) */
        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(138, 43, 226, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-premium:hover::before {
            left: 100%;
        }

        .btn-premium:hover {
            color: #fff;
            background: rgba(138, 43, 226, 0.15);
            border-color: #a76bff;
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        /* --- FOOTER --- */
        .final-footer {
            position: fixed;
            bottom: 25px;
            font-size: 11px;
            color: #444;
            letter-spacing: 2px;
            font-weight: 400;
            opacity: 0.6;
            animation: footerFade 0.8s 1.2s ease-out both;
        }

        /* ============================ 
           ANIMASYONLAR VE EFEKTLER 
           ============================ */

        /* 1. PANTER SÜREKLİ DÖNME VE SÜZÜLME (YÜKSEK KALİTE) */
        @keyframes pantherRotate360 {
            0% { 
                transform: translateZ(0) rotateY(0deg) translateY(0px) rotateX(0deg); 
            }
            25% { 
                transform: translateZ(20px) rotateY(90deg) translateY(-10px) rotateX(-3deg); 
            }
            50% { 
                transform: translateZ(0) rotateY(180deg) translateY(0px) rotateX(0deg); 
            }
            75% { 
                transform: translateZ(20px) rotateY(270deg) translateY(10px) rotateX(3deg); 
            }
            100% { 
                transform: translateZ(0) rotateY(360deg) translateY(0px) rotateX(0deg); 
            }
        }

        /* 2. ANA KONTEYNER AÇILIŞ */
        @keyframes containerReveal {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 3. LOGO GİRİŞ */
        @keyframes logoScaleIn {
            from { opacity: 0; transform: scale(0.5) translateZ(-100px); }
            to { opacity: 1; transform: scale(1) translateZ(0); }
        }

        /* 4. SHIMMER PARLAMA (SUB-TEXT) */
        @keyframes shimmerEffect {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* 5. GLITCH EFEKTİ (YAZI) */
        @keyframes glitchEffect {
            0% { text-shadow: 0 0 15px rgba(138, 43, 226, 0.8); }
            10%, 12% { text-shadow: 2px 0 1px #ff00ff, -2px 0 1px #00ffff; }
            14% { text-shadow: 0 0 15px rgba(138, 43, 226, 0.8); }
            50%, 52% { text-shadow: 1px 1px 0 #a76bff, -1px -1px 0 #fff; }
            54% { text-shadow: 0 0 15px rgba(138, 43, 226, 0.8); }
        }

        /* 6. LİNKLER SLIDE IN */
        @keyframes linksSlideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes footerFade { from { opacity: 0; } to { opacity: 0.6; } }

        /* Mobil Ayarı */
        @media (max-width: 600px) {
            .logo-area h1 { font-size: 2.5rem; letter-spacing: 6px; }
            .logo-3d-scene img { width: 180px; }
            .links-group { grid-template-columns: 1fr; width: 90%; }
        }
    </style>
</head>
<body>
    <div class="bg-lines"></div>
    
    <main class="main-container">
        <div class="logo-3d-scene">
            <img src="https://cdn.discordapp.com/attachments/1424736114098569296/1488882908398883077/95068122-4F16-428E-8C62-E1C302FCDF57.png?ex=69ce65c3&is=69cd1443&hm=d52c5344f24249404c2f44f9c4b5fbcd2ea3e9ba550c4ab46e7590b1cd582850&" alt="Panther Premium Asset">
        </div>

        <div class="logo-area">
            <h1>PANTHER</h1>
            <p class="sub-text">Optimization & Apex Performance</p>
        </div>

        <div class="links-group">
            <a href="#" class="btn-premium">Connect Discord</a>
            <a href="#" class="btn-premium">Get the Pack (v1.5)</a>
            <a href="#" class="btn-premium">Apex Showcase</a>
            <a href="#" class="btn-premium">Client Reviews</a>
        </div>

        <footer class="final-footer">
            © 2026 PANTHER PRIV. ALL RIGHTS RESERVED.
        </footer>
    </main>
</body>
</html>
