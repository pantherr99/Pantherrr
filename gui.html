<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther | External Interface v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            background-color: #050505; /* Gerçek kullanımda transparent olacak */
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .imgui-window {
            width: 950px; /* Ped sığması için genişliği artırdım */
            height: 600px;
            background: rgba(8, 8, 8, 0.98);
            border: 1px solid rgba(185, 147, 255, 0.15); /* image_03916f'deki mor tonu */
            border-radius: 16px;
            display: flex;
            flex-direction: row;
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            background: #080808;
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
        }

        .nav-item {
            width: 45px;
            height: 45px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: #444;
            background: rgba(255,255,255,0.02);
        }

        .nav-item.active {
            color: #b993ff;
            background: rgba(185, 147, 255, 0.1);
            box-shadow: 0 0 15px rgba(185, 147, 255, 0.05);
        }

        /* Ana İçerik Alanı (3 Sütunlu Yapı) */
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 260px 1fr 260px; /* Sol - Ped - Sağ */
            padding: 25px;
            gap: 20px;
        }

        /* Panel Stilleri */
        .settings-panel {
            background: rgba(12, 12, 12, 0.5);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #b993ff;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Karakter Alanı (Orta) */
        .ped-preview-area {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .ped-container {
            width: 100%;
            height: 400px;
            background: radial-gradient(circle, rgba(185, 147, 255, 0.05) 0%, transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ped-placeholder {
            width: 200px;
            height: 350px;
            opacity: 0.8;
            filter: drop-shadow(0 0 20px rgba(185, 147, 255, 0.2));
        }

        /* ESP Köşebentleri (image_0f4489'daki gibi) */
        .esp-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #00bfff; /* Neon Mavi */
        }
        .top-left { top: 10%; left: 15%; border-right: 0; border-bottom: 0; border-radius: 4px 0 0 0; }
        .top-right { top: 10%; right: 15%; border-left: 0; border-bottom: 0; border-radius: 0 4px 0 0; }
        .bottom-left { bottom: 10%; left: 15%; border-right: 0; border-top: 0; border-radius: 0 0 0 4px; }
        .bottom-right { bottom: 10%; right: 15%; border-left: 0; border-top: 0; border-radius: 0 0 4px 0; }

        /* Custom UI Elementleri */
        .gui-switch { position: relative; width: 32px; height: 16px; }
        .gui-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1a1a1a; transition: .3s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 10px; width: 10px; left: 3px; bottom: 3px;
            background-color: #333; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: rgba(185, 147, 255, 0.2); }
        input:checked + .slider:before { transform: translateX(16px); background-color: #b993ff; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #222; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 10px; width: 10px; border-radius: 50%;
            background: #b993ff; cursor: pointer; margin-top: -4px;
            box-shadow: 0 0 10px rgba(185, 147, 255, 0.5);
        }

        .status-badge {
            position: absolute;
            bottom: 15px;
            font-size: 9px;
            font-weight: 900;
            background: rgba(0, 191, 255, 0.1);
            color: #00bfff;
            padding: 2px 10px;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="imgui-window">
        <div class="sidebar">
            <div class="mb-10"><img src="https://api.dicebear.com/7.x/shapes/svg?seed=Panther&backgroundColor=b993ff" class="w-8 h-8 rounded-lg"></div>
            <div class="nav-item active">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
            </div>
            <div class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
            <div class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </div>
            <div class="mt-auto nav-item text-red-500/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
        </div>

        <div class="main-container">
            
            <div class="settings-panel">
                <div class="panel-title">Combat Settings</div>
                
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg border border-white/5">
                    <span class="text-[10px] font-bold uppercase tracking-tight">Master Aimbot</span>
                    <label class="gui-switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>

                <div class="space-y-1 mt-2">
                    <div class="flex justify-between"><span class="text-[9px] uppercase text-gray-500">Smoothness</span><span class="text-[#b993ff] text-[9px]">4.5</span></div>
                    <input type="range" min="0" max="20" value="4">
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between"><span class="text-[9px] uppercase text-gray-500">Field of View</span><span class="text-[#b993ff] text-[9px]">120.0</span></div>
                    <input type="range" min="0" max="360" value="120">
                </div>

                <div class="flex justify-between items-center py-1">
                    <span class="text-[10px] text-gray-300 font-semibold uppercase">Silent Aim</span>
                    <label class="gui-switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                
                <div class="flex justify-between items-center py-1 border-t border-white/5 pt-3">
                    <span class="text-[10px] text-gray-300 font-semibold uppercase">Show FOV Circle</span>
                    <label class="gui-switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>
            </div>

            <div class="ped-preview-area">
                <div class="text-[10px] absolute top-5 font-black italic tracking-[4px] opacity-30">PREVIEW_MODE</div>
                
                <div class="ped-container">
                    <div class="esp-corner top-left"></div>
                    <div class="esp-corner top-right"></div>
                    <div class="esp-corner bottom-left"></div>
                    <div class="esp-corner bottom-right"></div>

                    <img src="https://r2.fivem.net/dwm-v2/ped_example.png" alt="Ped" class="ped-placeholder" onerror="this.src='https://i.imgur.com/3Ym9FhM.png'">
                </div>

                <div class="status-badge">you mad?</div>
                <div class="text-[8px] absolute bottom-2 opacity-20">HWID: 592X-PP91-PANTHER-001</div>
            </div>

            <div class="settings-panel">
                <div class="panel-title">Visual Intelligence</div>
                
                <div class="grid grid-cols-1 gap-2">
                    <div class="flex justify-between items-center p-2 rounded bg-white/5">
                        <span class="text-[10px] font-bold uppercase">Box ESP</span>
                        <label class="gui-switch"><input type="checkbox" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex justify-between items-center p-2 rounded bg-white/5">
                        <span class="text-[10px] font-bold uppercase">Skeleton</span>
                        <label class="gui-switch"><input type="checkbox" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex justify-between items-center p-2 rounded bg-white/5">
                        <span class="text-[10px] font-bold uppercase">Snaplines</span>
                        <label class="gui-switch"><input type="checkbox"><span class="slider"></span></label>
                    </div>
                    <div class="flex justify-between items-center p-2 rounded bg-white/5">
                        <span class="text-[10px] font-bold uppercase">Health Bar</span>
                        <label class="gui-switch"><input type="checkbox" checked><span class="slider"></span></label>
                    </div>
                    <div class="flex justify-between items-center p-2 rounded bg-white/5">
                        <span class="text-[10px] font-bold uppercase">Name ESP</span>
                        <label class="gui-switch"><input type="checkbox" checked><span class="slider"></span></label>
                    </div>
                </div>

                <div class="mt-4 p-3 border border-[#b993ff]/20 rounded-lg bg-[#b993ff]/5">
                    <div class="text-[9px] font-black uppercase mb-2 text-[#b993ff]">ESP Color</div>
                    <div class="flex gap-2">
                        <div class="w-6 h-6 rounded bg-[#00bfff] cursor-pointer ring-2 ring-white/20"></div>
                        <div class="w-6 h-6 rounded bg-[#b993ff] cursor-pointer"></div>
                        <div class="w-6 h-6 rounded bg-[#ff4b4b] cursor-pointer"></div>
                        <div class="w-6 h-6 rounded bg-[#4bff4b] cursor-pointer"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
