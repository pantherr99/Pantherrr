<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther | Identity Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        /* Arka plan efektleri */
        .bg-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 70%); z-index: -1; }
        .cyber-grid { position: absolute; inset: 0; background-image: linear-gradient(to right, #111 1px, transparent 1px), linear-gradient(to bottom, #111 1px, transparent 1px); background-size: 40px 40px; z-index: -2; opacity: 0.5; }

        /* Modern Glassmorphism */
        .auth-card {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-cyber {
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            color: #10b981 !important;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-cyber:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);
            transform: scale(1.02);
            outline: none;
        }

        /* Yükleme barı animasyonu */
        .scan-line { position: absolute; height: 2px; width: 100%; background: #10b981; top: 0; left: 0; animation: scan 3s infinite linear; opacity: 0.5; box-shadow: 0 0 15px #10b981; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="cyber-grid"></div>
    <div class="bg-glow"></div>

    <div class="auth-card p-12 rounded-[3rem] w-full max-w-md relative overflow-hidden">
        <div class="scan-line"></div>
        
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-2xl bg-[#10b981]/5 mb-4">
                <svg class="w-10 h-10 text-[#10b981]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white">System <span class="text-[#10b981]">Access</span></h2>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.4em] mt-2">Identity Verification Required</p>
        </div>

        <div class="space-y-6">
            <div class="relative group">
                <label class="text-[9px] font-black uppercase text-gray-600 tracking-widest ml-4 mb-2 block">License Key</label>
                <input type="text" id="license_input" placeholder="PANTHER-XXXX-XXXX" 
                       class="input-cyber w-full p-5 rounded-2xl text-center font-mono tracking-[0.2em] text-sm uppercase">
            </div>

            <button id="login_btn" 
                    class="group relative w-full py-5 bg-[#10b981] text-black font-black italic rounded-2xl uppercase tracking-widest overflow-hidden transition-all hover:scale-[1.02] active:scale-95 shadow-[0_20px_40px_-10px_rgba(16,185,129,0.3)]">
                <span class="relative z-10" id="btn_text">Initialize Protocol</span>
                <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 transition-opacity"></div>
            </button>
            
            <p id="error_msg" class="text-red-500 text-[10px] font-black text-center mt-2 uppercase tracking-widest opacity-0 transition-opacity duration-300 h-4">Invalid Protocol</p>
        </div>

        <div class="mt-8 pt-6 border-t border-white/5 space-y-4">
            <div class="text-[8px] text-gray-600 uppercase tracking-widest leading-relaxed text-center">
                <span class="text-gray-400">Disclaimer:</span> Panther is a performance tool. Use at your own risk. 
                We are not responsible for hardware issues or account bans.
            </div>
            
            <div class="flex justify-center gap-4 text-[9px] font-bold uppercase tracking-widest text-gray-500">
                <a href="#" class="hover:text-white transition">Terms</a>
                <a href="#" class="hover:text-white transition">Privacy</a>
            </div>

            <div class="text-center pt-2">
                <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">
                    No access? <a href="https://discord.gg/EPYYyc7Qp" target="_blank" class="text-white hover:text-[#10b981] transition">Contact Command</a>
                </p>
                <a href="index.html" class="inline-block mt-4 text-[9px] text-gray-700 hover:text-white transition uppercase font-black tracking-[0.2em]">← Abort Sequence</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, set, get, child, onDisconnect } from "./firebase-config.js";

        const btn = document.getElementById('login_btn');
        const btnText = document.getElementById('btn_text');
        const errorMsg = document.getElementById('error_msg');
        const keyInput = document.getElementById('license_input');

        btn.addEventListener('click', handleLogin);
        keyInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });

        // CIHAZ KİMLİĞİ (HWID SİMLÜASYONU)
        function generateHWID() {
            let deviceID = localStorage.getItem('panther_device_id');
            if (!deviceID) {
                deviceID = crypto.randomUUID(); 
                localStorage.setItem('panther_device_id', deviceID);
            }
            return deviceID;
        }

        async function handleLogin() {
            const key = keyInput.value.trim();

            if(!key) {
                showError("LİSANS ANAHTARI GİRİNİZ!");
                return;
            }

            if(key.toUpperCase() === "ADMIN") {
                window.location.href = "admin.html";
                return;
            }

            // UI LOCK
            btnText.innerText = "VERIFYING...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none"; 

            try {
                const userHWID = generateHWID(); 
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, `keys/${key}`));

                if (snapshot.exists()) {
                    let foundKey = snapshot.val();
                    let currentTime = new Date().getTime();

                    // DURUM 1: UNUSED - LİSANSI İLK KEZ BU PC'YE KİLİTLE
                    if (foundKey.status === 'UNUSED') {
                        foundKey.status = 'ACTIVE';
                        foundKey.hwid = userHWID; // İlk giren PC'nin ID'sini Firebase'e yazıyoruz
                        foundKey.expireDate = currentTime + (parseInt(foundKey.days) * 86400000);
                        foundKey.isOnline = true;
                        foundKey.activatedAt = currentTime;

                        await set(ref(db, 'keys/' + key), foundKey);
                        onDisconnect(ref(db, `keys/${key}/isOnline`)).set(false);

                        finalizeLogin(key, foundKey);
                    } 
                    
                    // DURUM 2: ACTIVE - MEVCUT LİSANS KONTROLLERİ
                    else if (foundKey.status === 'ACTIVE') {
                        
                        // 1. HWID KONTROLÜ (Kilidi kontrol et)
                        if (foundKey.hwid && foundKey.hwid !== userHWID) {
                            showError("BU LİSANS BAŞKA BİR CİHAZA KAYITLIDIR!");
                            resetUI();
                            return;
                        }

                        // 2. SÜRE KONTROLÜ
                        if (currentTime > foundKey.expireDate) {
                            foundKey.status = 'EXPIRED';
                            foundKey.isOnline = false;
                            await set(ref(db, 'keys/' + key), foundKey);
                            showError("LİSANS SÜRESİ DOLMUŞTUR!");
                        } 
                        
                        // 3. ONLINE KONTROLÜ (Aynı anda iki kişi girmesin)
                        else if (foundKey.isOnline === true) {
                            showError("BU LİSANS ŞU AN BAŞKA BİR OTURUMDA AÇIK!");
                        } 
                        
                        // 4. HER ŞEY OK - GİRİŞ YAP
                        else {
                            foundKey.isOnline = true;
                            await set(ref(db, 'keys/' + key), foundKey);
                            onDisconnect(ref(db, `keys/${key}/isOnline`)).set(false);
                            finalizeLogin(key, foundKey);
                        }
                    } 
                    else {
                        showError("LİSANS GEÇERSİZ VEYA SÜRESİ BİTMİŞ!");
                    }
                } else {
                    showError("GEÇERSİZ PROTOKOL ANAHTARI!");
                }
            } catch (error) {
                console.error(error);
                showError("SUNUCU BAĞLANTI HATASI!");
            }
            resetUI();
        }

        function finalizeLogin(key, data) {
            localStorage.setItem('panther_active_key', key);
            localStorage.setItem('current_user', JSON.stringify(data));
            window.location.href = "dashboard.html";
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.style.opacity = "1";
            setTimeout(() => { errorMsg.style.opacity = "0"; }, 3000);
        }

        function resetUI() {
            btnText.innerText = "INITIALIZE PROTOCOL";
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
        }
    </script>
</body>
</html>
